<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Facility Map — Room Annotation</title>
<link rel="stylesheet" href="/web/style.css"/>
</head>
<body>
<header id="topbar">
  <nav id="crumbs"></nav>
  <div class="spacer"></div>
  <div id="toolbar"></div>
  <button id="settings-gear" title="Settings"></button>
</header>

<main id="stage">
  <!-- Siteplan / building / floor views render here -->
</main>

<aside id="panel" class="hidden">
  <div id="panel-head">
    <span id="panel-title">Rooms</span>
    <button id="panel-close" title="Close">&times;</button>
  </div>
  <div id="panel-body"></div>
</aside>

<div id="toast"></div>

<!-- Loaded in dependency order; all classes are globals (no build step). -->
<script src="/web/lib.js"></script>
<script src="/web/device-shapes.js"></script>
<script src="/web/netbox.js"></script>
<script src="/web/store.js"></script>
<script src="/web/grid.js"></script>
<script src="/web/panzoom.js"></script>
<script src="/web/editor.js"></script>
<script src="/web/floor-editor.js"></script>
<script src="/web/siteplan-editor.js"></script>
<script src="/web/import-wizard.js"></script>
<script src="/web/app.js"></script>
</body>
</html>
